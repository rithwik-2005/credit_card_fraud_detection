<!DOCTYPE html>
<html>

<head>

<title>Transaction Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Enter Transaction Details</h2>

<form method="POST" class="shadow p-4 bg-white rounded">

<div class="mb-3">

<label>Transaction ID</label>

<input type="number" name="TransactionID" class="form-control" required>

</div>


<div class="mb-3">

<label>Transaction Date & Time</label>

<input type="datetime-local" name="TransactionDate" class="form-control" required>

</div>


<div class="mb-3">

<label>Amount</label>

<input type="number" step="0.01" name="Amount" class="form-control" required>

</div>


<div class="mb-3">

<label>Merchant ID</label>

<input type="number" name="MerchantID" class="form-control" required>

</div>


<div class="mb-3">

<label>Transaction Type</label>

<select name="TransactionType" class="form-control">

{% for t in transaction_types %}

<option value="{{ t }}">{{ t }}</option>

{% endfor %}

</select>

</div>


<div class="mb-3">

<label>Location</label>

<select name="Location" class="form-control">

{% for loc in locations %}

<option value="{{ loc }}">{{ loc }}</option>

{% endfor %}

</select>

</div>


<button type="submit" class="btn btn-primary w-100">

Predict Fraud Risk

</button>

</form>

</div>

</body>

</html>
