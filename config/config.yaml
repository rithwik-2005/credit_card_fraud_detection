artifact_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_file: data/credit_data.csv
  local_data_file: artifacts/data_ingestion/raw.csv

data_validation:
  root_dir: artifacts/data_validation
  local_data_file: artifacts/data_ingestion/raw.csv
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  input_data_path: artifacts/data_ingestion/raw.csv
  transformed_data_path: artifacts/data_transformation/transformed.csv

model_trainer:
  root_dir: artifacts/model_trainer
  input_data_path: artifacts/data_transformation/transformed.csv
  x_train_data_path: artifacts/model_trainer/x_train.csv
  y_train_data_path: artifacts/model_trainer/y_train.csv
  x_test_data_path: artifacts/model_trainer/x_test.csv
  y_test_data_path: artifacts/model_trainer/y_test.csv
  model_name: model.joblib

model_evaluation:
  root_dir: artifacts/model_evaluation
  x_test_data_path: artifacts/model_trainer/x_test.csv
  y_test_data_path: artifacts/model_trainer/y_test.csv
  model_path: artifacts/model_trainer/model.joblib
  metric_file: artifacts/model_evaluation/metrics.json
  classification_report_path: artifacts/model_evaluation/classification_report.txt
  confusion_matrix_path: artifacts/model_evaluation/confusion_matrix.csv
