name: Build and Deploy

on:
    push:
        branches:
            - main

env:
    FASTAPI_IMAGE: rithwik2005/credit_card_fraud_detection_fastapi
    FLASK_IMAGE: rithwik2005/credit_card_fraud_detection_flask

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout repository
            - name: Checkout repository
              uses: actions/checkout@v4

            # Step 2: Setup Docker Buildx
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Step 3: Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # Step 4: Build and push FastAPI image
            - name: Build and push FastAPI image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./fastapi_app/Dockerfile
                  push: true
                  tags: |
                      ${{ env.FASTAPI_IMAGE }}:latest
                      ${{ env.FASTAPI_IMAGE }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Step 5: Build and push Flask image
            - name: Build and push Flask image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./flask_app/Dockerfile
                  push: true
                  tags: |
                      ${{ env.FLASK_IMAGE }}:latest
                      ${{ env.FLASK_IMAGE }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Step 6: Trigger FastAPI Render deploy
            - name: Deploy FastAPI to Render
              run: |
                  curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_FASTAPI }}/deploys" \
                  -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                  -H "Content-Type: application/json" \
                  -d '{"clearCache":false}'

            # Step 7: Trigger Flask Render deploy
            - name: Deploy Flask to Render
              run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_FLASK }}/deploys" \
