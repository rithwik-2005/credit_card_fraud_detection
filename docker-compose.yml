version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: fastapi_app/Dockerfile
    image: rithwik2005/credit_card_fraud_detection_fastapi:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  flask:
    build:
      context: .
      dockerfile: flask_app/Dockerfile
    image: rithwik2005/credit_card_fraud_detection_flask:latest
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - FASTAPI_URL=http://fastapi:8000/predict
      - PORT=5000
    depends_on:
      - fastapi